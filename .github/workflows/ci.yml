name: Build & Release

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_AUDIT_VERSION: 0.22.2
  CARGO_DEB_VERSION: 3.7.0
  CARGO_GENERATE_RPM_VERSION: 0.21.0
  CARGO_WIX_VERSION: 0.3.9
  FFMPEG_RELEASE_TAG: autobuild-2026-06-09-13-57
  FFMPEG_ASSET: ffmpeg-n8.1.1-11-ge4c7fbf6c0-win64-lgpl-8.1.zip

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. TEST — corre en cada push / PR en los 3 sistemas
  # ─────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check formatting (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt -- --check

      - name: Run clippy (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --verbose

  # ─────────────────────────────────────────────────────────
  # 2. AUDIT — verifica vulnerabilidades en dependencias
  # ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-audit
        run: |
          cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked
          cargo audit --version

      - name: Run audit
        run: cargo audit

  # ─────────────────────────────────────────────────────────
  # 3. PACKAGE — compila y empaqueta para cada plataforma
  #    Se activa con tags v* o workflow_dispatch manual
  # ─────────────────────────────────────────────────────────
  package:
    name: Package (${{ matrix.dist_prefix }})
    needs: [test, audit]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — Debian (.deb) + Fedora (.rpm) + binario
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            dist_prefix: cbrec-linux-x86_64

          # Windows — instalador (.msi) + portable (.zip/.exe)
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            dist_prefix: cbrec-windows-x86_64

          # macOS Intel
          - runner: macos-13
            target: x86_64-apple-darwin
            dist_prefix: cbrec-macos-x86_64

          # macOS Apple Silicon (M1/M2/M3)
          - runner: macos-latest
            target: aarch64-apple-darwin
            dist_prefix: cbrec-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust (stable + target)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      # ── Verificar que el tag coincide con Cargo.toml ──────
      - name: Verify tag vs Cargo.toml (bash)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          ver="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)"
          if [[ "v${ver}" != "${tag}" ]]; then
            echo "ERROR: Tag (${tag}) != Cargo.toml version (v${ver})"
            exit 1
          fi

      - name: Verify tag vs Cargo.toml (pwsh)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = (Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"' |
                  Select-Object -First 1).Line
          $ver = ($ver -split '"')[1]
          if ("v$ver" -ne $tag) {
            Write-Error "ERROR: Tag ($tag) != Cargo.toml version (v$ver)"
            exit 1
          }

      # ── Build release ─────────────────────────────────────
      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package: Linux (.deb + .rpm + binario) ────────────
      - name: Install packaging tools (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y rpm
          cargo install cargo-deb --version "$CARGO_DEB_VERSION" --locked
          cargo install cargo-generate-rpm --version "$CARGO_GENERATE_RPM_VERSION" --locked
          cargo deb --version
          cargo generate-rpm --version

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Binario sin extension
          cp "target/${{ matrix.target }}/release/cbrec" \
             "dist/${{ matrix.dist_prefix }}"

          # Compatibilidad para herramientas de paquete que leen assets desde target/release.
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/cbrec" target/release/cbrec

          # .deb (Debian / Ubuntu)
          cargo deb --no-build --locked \
            --target ${{ matrix.target }} \
            --output "dist/${{ matrix.dist_prefix }}.deb"

          # .rpm (Fedora / RHEL / openSUSE)
          cargo generate-rpm \
            --target ${{ matrix.target }} \
            --output "dist/${{ matrix.dist_prefix }}.rpm"

      - name: Smoke package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "dist/${{ matrix.dist_prefix }}"
          "dist/${{ matrix.dist_prefix }}" --version
          test -s "dist/${{ matrix.dist_prefix }}.deb"
          test -s "dist/${{ matrix.dist_prefix }}.rpm"
          dpkg-deb --contents "dist/${{ matrix.dist_prefix }}.deb" | grep -q './usr/bin/cbrec'
          rpm -qpl "dist/${{ matrix.dist_prefix }}.rpm" | grep -q '/usr/bin/cbrec'

      # ── Package: macOS (.tar.gz) ──────────────────────────
      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/${{ matrix.dist_prefix }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" cbrec

      - name: Smoke package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          tar -xzf "dist/${{ matrix.dist_prefix }}.tar.gz" -C "$tmp"
          chmod +x "$tmp/cbrec"
          "$tmp/cbrec" --version

      # ── Package: Windows (.msi + .exe) ────────────────────
      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Directory `
            -Filter "WiX Toolset*" |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) { throw "WiX Toolset folder not found" }
          Add-Content $env:GITHUB_PATH "$($wixDir.FullName)\bin"
          Add-Content $env:GITHUB_ENV  "WIX=$($wixDir.FullName)\"

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo install cargo-wix --version "$env:CARGO_WIX_VERSION" --locked
          cargo wix --version

      - name: Download FFmpeg LGPL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = $env:FFMPEG_ASSET
          $releaseTag = $env:FFMPEG_RELEASE_TAG
          $baseUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/$releaseTag"
          New-Item -ItemType Directory -Force ".ffmpeg" | Out-Null

          Invoke-WebRequest "$baseUrl/checksums.sha256" -OutFile ".ffmpeg/checksums.sha256"
          Invoke-WebRequest "$baseUrl/$asset" -OutFile ".ffmpeg/$asset"

          $line = Select-String -Path ".ffmpeg/checksums.sha256" -SimpleMatch $asset |
            Select-Object -First 1
          if (-not $line) { throw "Checksum not found for $asset" }

          $expected = ($line.Line -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash ".ffmpeg/$asset" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "FFmpeg checksum mismatch. expected=$expected actual=$actual"
          }

          Expand-Archive ".ffmpeg/$asset" -DestinationPath ".ffmpeg/extracted" -Force
          $ffmpeg = Get-ChildItem ".ffmpeg/extracted" -Recurse -Filter "ffmpeg.exe" |
            Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe not found in $asset" }

          Copy-Item $ffmpeg.FullName "target\${{ matrix.target }}\release\ffmpeg.exe" -Force
          Copy-Item "THIRD_PARTY_NOTICES.md" `
            "target\${{ matrix.target }}\release\THIRD_PARTY_NOTICES.md" -Force

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null

          # Portable .exe tradicional
          Copy-Item "target\${{ matrix.target }}\release\cbrec.exe" `
            "dist\${{ matrix.dist_prefix }}.exe" -Force

          # Portable plug and play con FFmpeg incluido
          $portableDir = "dist\${{ matrix.dist_prefix }}-portable"
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\cbrec.exe" $portableDir -Force
          Copy-Item "target\${{ matrix.target }}\release\ffmpeg.exe" $portableDir -Force
          Copy-Item "README.md" $portableDir -Force
          Copy-Item "LICENSE" $portableDir -Force
          Copy-Item "THIRD_PARTY_NOTICES.md" $portableDir -Force
          Compress-Archive -Path "$portableDir\*" `
            -DestinationPath "dist\${{ matrix.dist_prefix }}-portable.zip" -Force
          Remove-Item $portableDir -Recurse -Force

          # Generar wix/main.wxs desde Cargo.toml para evitar version hardcodeada
          $versionLine = (Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"' |
            Select-Object -First 1).Line
          if (-not $versionLine) { throw "Version not found in Cargo.toml" }
          $version = ($versionLine -split '"')[1]

          $template = Get-Content "wix\main.wxs.in" -Raw
          $mainWxs = $template.Replace("@@VERSION@@", $version)
          if ($mainWxs.Contains("@@VERSION@@")) {
            throw "WiX template version placeholder was not replaced"
          }
          Set-Content "wix\main.wxs" $mainWxs -Encoding utf8

          # Generar .msi
          cargo wix --target ${{ matrix.target }} --nocapture

          $msi = Get-ChildItem `
            -Path @("target\${{ matrix.target }}\wix", "target\wix") `
            -Filter "*.msi" -Recurse |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) { throw "MSI not found under target\wix" }
          Copy-Item $msi.FullName "dist\${{ matrix.dist_prefix }}.msi" -Force

      - name: Smoke package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          & "dist\${{ matrix.dist_prefix }}.exe" --version
          if (-not (Test-Path "dist\${{ matrix.dist_prefix }}.msi")) {
            throw "MSI artifact not found"
          }

          $smokeDir = "dist\smoke-portable"
          Remove-Item $smokeDir -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive "dist\${{ matrix.dist_prefix }}-portable.zip" `
            -DestinationPath $smokeDir -Force
          & "$smokeDir\cbrec.exe" --version
          & "$smokeDir\ffmpeg.exe" -version
          if (-not (Test-Path "$smokeDir\THIRD_PARTY_NOTICES.md")) {
            throw "THIRD_PARTY_NOTICES.md not found in portable zip"
          }

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.dist_prefix }}
          path: dist/*
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # 4. PKGBUILD — genera el PKGBUILD para Arch Linux / AUR
  #    Solo corre en tags v*
  # ─────────────────────────────────────────────────────────
  pkgbuild:
    name: Generate Arch PKGBUILD
    needs: [test, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate PKGBUILD from template
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          URL="https://github.com/Duna-tools/cbrec/archive/refs/tags/v${VER}.tar.gz"

          # Descargar el tarball para calcular el checksum real
          curl -fsSL -o "cbrec-${VER}.tar.gz" "$URL"
          SHA="$(sha256sum "cbrec-${VER}.tar.gz" | awk '{print $1}')"

          mkdir -p dist
          sed \
            -e "s/@@VERSION@@/${VER}/g" \
            -e "s/@@SHA256@@/${SHA}/g" \
            -e "s|@@URL@@|${URL}|g" \
            packaging/arch/PKGBUILD.template > dist/PKGBUILD

          echo "Generated PKGBUILD for v${VER} (sha256: ${SHA})"
          cat dist/PKGBUILD

      - name: Upload PKGBUILD artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-arch-pkgbuild
          path: dist/PKGBUILD
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # 5. RELEASE — crea la GitHub Release con todos los assets
  #    Solo corre en tags v*, después de package y pkgbuild
  # ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [package, pkgbuild]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release notes
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cat > release_notes.md << EOF
          ## Release ${VERSION}

          ### Instalación

          **Debian / Ubuntu**
          \`\`\`bash
          sudo dpkg -i cbrec-linux-x86_64.deb
          \`\`\`

          **Fedora / RHEL / openSUSE**
          \`\`\`bash
          sudo rpm -i cbrec-linux-x86_64.rpm
          \`\`\`

          **Arch Linux**
          \`\`\`bash
          # Descarga el PKGBUILD adjunto, colócalo en una carpeta vacía y ejecuta:
          makepkg -si
          \`\`\`

          **macOS Intel (x86_64)**
          \`\`\`bash
          tar -xzf cbrec-macos-x86_64.tar.gz
          sudo mv cbrec /usr/local/bin/
          \`\`\`

          **macOS Apple Silicon (M1/M2/M3)**
          \`\`\`bash
          tar -xzf cbrec-macos-aarch64.tar.gz
          sudo mv cbrec /usr/local/bin/
          \`\`\`

          **Windows**
          - Instalador: ejecuta \`cbrec-windows-x86_64.msi\`
          - Portable plug and play: descomprime \`cbrec-windows-x86_64-portable.zip\`
          - Portable simple: copia \`cbrec-windows-x86_64.exe\` a cualquier carpeta en tu PATH y asegúrate de tener FFmpeg instalado
          - El MSI y portable plug and play incluyen FFmpeg LGPL desde BtbN/FFmpeg-Builds: \`${FFMPEG_RELEASE_TAG}\` / \`${FFMPEG_ASSET}\`

          ### Verificación de integridad
          \`\`\`bash
          sha256sum -c SHA256SUMS
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*
          fail_on_unmatched_files: true
